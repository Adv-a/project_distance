# docker-compose.yml local/dev
# Commande : docker compose up --build

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_distance}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - web
    restart: unless-stopped

  backend:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_DEBUG: "true"
      DJANGO_DB: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RUN_MIGRATIONS: "1"
      COLLECTSTATIC: "0"
      WAIT_FOR_DB: "1"
      PYTHONUNBUFFERED: "1"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media:/app/media
      - django_static:/var/www/static
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - web
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  media:
  django_static:
  frontend_node_modules:

networks:
  web:

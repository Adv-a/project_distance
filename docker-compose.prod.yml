# docker-compose.prod.yml production
# Commande : docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - web
    restart: unless-stopped

  backend:
    build:
      context: .
      target: prod
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_DEBUG: "false"
      DJANGO_DB: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      RUN_MIGRATIONS: "1"
      COLLECTSTATIC: "1"
      WAIT_FOR_DB: "1"
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - web
    restart: unless-stopped
    ports:
      # Bind seulement en localhost : ton Nginx host peut proxy vers 127.0.0.1:8000.
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - media:/app/media
      - django_static:/var/www/static

volumes:
  pgdata:
  media:
  django_static:

networks:
  web:

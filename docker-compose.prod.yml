services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
    volumes:
      - django_static:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        EXPO_PUBLIC_API_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - django_static:/var/www/django/static:ro
      - media:/var/www/django/media:ro
    networks:
      - app

volumes:
  pgdata:
  django_static:
  media:

networks:
  app: